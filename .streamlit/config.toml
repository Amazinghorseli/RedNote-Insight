[theme]
primaryColor = "#ff5a5f"
backgroundColor = "#f8f9fa"
secondaryBackgroundColor = "#ffffff"
textColor = "#1a1a2e"
font = "sans serif"

[server]
headless = true
runOnSave = false
fileWatcherType = "poll"

[browser]
gatherUsageStats = false
serverAddress = "0.0.0.0"
serverPort = 8501

[client]
showErrorDetails = true
toolbarMode = "minimal"
