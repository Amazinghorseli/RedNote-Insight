# Alembic 配置文件
# =====================

[alembic]
# 迁移脚本目录
script_location = alembic

# SQLAlchemy URL（可被环境变量覆盖）
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/rednote_insight

# 日志
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
