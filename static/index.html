<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书爆款雷达 — 选品机会</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container">

        <!-- ===== 侧边栏 ===== -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">&#x1F4A1; 选品雷达</div>
                <div class="tagline">小红书选品 · 机会评分 · 执行清单</div>
            </div>
            <nav class="nav-tabs">
                <button class="nav-tab" data-tab="hotlist">
                    <span class="tab-icon">&#x1F4A1;</span>
                    灵感库
                </button>
                <button class="nav-tab active" data-tab="discover">
                    <span class="tab-icon">&#x1F3AF;</span>
                    发现机会
                </button>
            </nav>
            <div class="sidebar-footer">
                <div class="version">v2.0 · 选品雷达</div>
            </div>
        </aside>

        <!-- ===== 主内容 ===== -->
        <main class="main-content" id="main-content">

            <!-- ===== 发现机会 Tab ===== -->
            <div class="tab-content active" id="tab-discover">

                <!-- Hero 区域 -->
                <div class="hero-section">
                    <h1 class="hero-title">&#x1F50D; 选品雷达 + 选题引擎</h1>
                    <p class="hero-desc">输入品类名，一键生成两套方案。<strong>选品分析</strong>看商机，<strong>博主方案</strong>看脚本——博主直接复制就能拍。</p>
                    <div class="input-card">
                        <div class="input-row">
                            <input type="text" class="main-input" id="category-input"
                                   placeholder="输入品类名，例如：辣条、磁吸感应灯" list="category-suggestions">
                            <datalist id="category-suggestions"></datalist>
                            <button class="btn-primary" id="search-btn">&#x1F50D; 选品分析</button>
                            <button class="btn-agent" id="agent-btn">&#x1F3AC; 博主方案</button>
                        </div>
                        <div class="quick-tags" id="quick-tags">
                            <span class="quick-tag-label">热门：</span>
                        </div>
                    </div>
                </div>

                <!-- 加载指示器 -->
                <div id="loading-indicator" class="loading-indicator" style="display:none;">
                    <div class="loading-spinner"></div>
                    <span>加载中...</span>
                </div>

                <!-- 搜索热词 -->
                <div id="trending-section" class="trending-section">
                    <div class="section-header">
                        <h2>&#x1F50D; 小红书搜索热词</h2>
                        <button class="btn-text" id="refresh-trending-btn">&#x1F504; 刷新</button>
                    </div>
                    <div class="trending-tags" id="trending-tags">
                        <!-- JS 动态渲染 -->
                    </div>
                </div>

                <!-- 排行榜区域 -->
                <div id="rankings-section">
                    <div class="section-header">
                        <h2>&#x1F525; 本周热门品类机会</h2>
                        <span class="section-badge" id="total-badge">加载中...</span>
                    </div>
                    <div class="ranking-list" id="ranking-list">
                        <!-- JS 动态渲染 -->
                    </div>
                </div>

                <!-- 品类详情弹出层 -->
                <div id="detail-overlay" class="detail-overlay" style="display:none;">
                    <div class="detail-card" id="detail-card">
                        <button class="detail-close" id="detail-close">&times;</button>
                        <div id="detail-content">
                            <!-- JS 动态渲染 -->
                        </div>
                    </div>
                </div>

            </div>

            <!-- ===== 灵感库 Tab ===== -->
            <div class="tab-content" id="tab-hotlist">
                <div class="hero-section" style="margin-bottom:24px;">
                    <h1 class="hero-title">&#x1F4A1; 灵感库</h1>
                    <p class="hero-desc">不知道搜什么？按品类浏览精选方向，每条都保证有数据，点一下就是选品+选题双报告。</p>
                    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                        <span style="font-size:13px;color:var(--text-secondary);">&#x1F4C5; <span id="hotlist-date">加载中...</span></span>
                        <button class="btn-text" id="refresh-hotlist-btn">&#x1F504; 刷新</button>
                    </div>
                    <div class="hotlist-filters" id="hotlist-filters" style="margin-top:12px;">
                        <span class="hotlist-filter active" data-cat="全部">全部</span>
                    </div>
                </div>

                <div id="hotlist-loading" class="loading-indicator" style="display:none;">
                    <div class="loading-spinner"></div>
                    <span>加载中...</span>
                </div>

                <div class="hotlist-board" id="hotlist-board">
                    <div class="empty-state">
                        <div class="empty-icon">&#x1F4CA;</div>
                        <p>正在加载热榜数据...</p>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script src="/static/js/app.js"></script>
</body>
</html>
